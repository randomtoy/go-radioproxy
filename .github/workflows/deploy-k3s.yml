name: Deploy to K3s (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      image_repository:
        required: true
        type: string
      values_file:
        required: true
        type: string
      namespace:
        required: true
        type: string
      release_name:
        required: false
        type: string
        default: go-radioproxy

permissions:
  contents: read

env:
  HELM_VERSION: v3.14.0
  KUBECTL_VERSION: v1.29.0
  LOCAL_PORT: 16443
  CHART_PATH: deploy/helm/go-radioproxy
  GHCR_PULL_SECRET_NAME: ghcr-radioproxy
  USERS_SECRET_NAME: stream-proxy-users

jobs:
  deploy:
    name: Deploy to K3s (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Setup SSH key
        env:
          SSH_HOST: ${{ secrets.SSH_HOST != '' && secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || vars.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_PORT="${SSH_PORT:-22}"
          if [[ -n "$SSH_HOST" ]]; then
            ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          fi

      - name: Start SSH tunnel
        id: tunnel
        env:
          SSH_HOST: ${{ secrets.SSH_HOST != '' && secrets.SSH_HOST || vars.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER != '' && secrets.SSH_USER || vars.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || vars.SSH_PORT }}
          K8S_API_HOST: ${{ secrets.K8S_API_HOST != '' && secrets.K8S_API_HOST || vars.K8S_API_HOST }}
          K8S_API_PORT: ${{ secrets.K8S_API_PORT != '' && secrets.K8S_API_PORT || vars.K8S_API_PORT }}
        run: |
          SSH_PORT="${SSH_PORT:-22}"
          K8S_API_HOST="${K8S_API_HOST:-127.0.0.1}"
          K8S_API_PORT="${K8S_API_PORT:-6443}"
          if [[ -z "$SSH_HOST" || -z "$SSH_USER" ]]; then
            echo "SSH_HOST or SSH_USER is empty; set repository Variables/Secrets before deploy"
            exit 1
          fi

          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              -o ExitOnForwardFailure=yes \
              -o LogLevel=ERROR \
              -i ~/.ssh/deploy_key \
              -N \
              -L ${{ env.LOCAL_PORT }}:${K8S_API_HOST}:${K8S_API_PORT} \
              -p ${SSH_PORT} \
              ${SSH_USER}@${SSH_HOST} &

          SSH_PID=$!
          echo "ssh_pid=$SSH_PID" >> $GITHUB_OUTPUT

          for _ in {1..30}; do
            if nc -z 127.0.0.1 ${{ env.LOCAL_PORT }} 2>/dev/null; then
              break
            fi
            if ! kill -0 $SSH_PID 2>/dev/null; then
              echo "SSH process died"
              exit 1
            fi
            sleep 1
          done

          nc -z 127.0.0.1 ${{ env.LOCAL_PORT }} 2>/dev/null || (echo "Tunnel failed to start" && exit 1)

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          sed -i -E "s|(server: https?://)[^:]+:[0-9]+|\1127.0.0.1:${{ env.LOCAL_PORT }}|g" ~/.kube/config

      - name: Verify cluster connection
        run: |
          kubectl cluster-info --request-timeout=15s
          kubectl get nodes --request-timeout=15s

      - name: Create namespace
        run: |
          kubectl create namespace "${{ inputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GHCR pull secret
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [[ -z "$GHCR_PULL_TOKEN" ]]; then
            echo "GHCR_PULL_TOKEN is empty, skipping docker-registry secret creation"
            exit 0
          fi
          kubectl create secret docker-registry "${{ env.GHCR_PULL_SECRET_NAME }}" \
            --namespace "${{ inputs.namespace }}" \
            --docker-server=ghcr.io \
            --docker-username="${{ github.repository_owner }}" \
            --docker-password="$GHCR_PULL_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create users config secret
        env:
          USERS_YAML_B64: ${{ secrets.USERS_YAML_B64 }}
        run: |
          if [[ -z "$USERS_YAML_B64" ]]; then
            echo "USERS_YAML_B64 secret is required"
            exit 1
          fi

          tmp_users="$(mktemp)"
          echo "$USERS_YAML_B64" | base64 -d > "$tmp_users"

          if ! grep -Eq "^[[:space:]]*users:" "$tmp_users"; then
            echo "decoded USERS_YAML_B64 does not look like a valid users.yaml"
            exit 1
          fi

          kubectl create secret generic "${{ env.USERS_SECRET_NAME }}" \
            --namespace "${{ inputs.namespace }}" \
            --from-file=users.yaml="$tmp_users" \
            --dry-run=client -o yaml | kubectl apply -f -

          rm -f "$tmp_users"

      - name: Lint Helm chart
        run: helm lint ${{ env.CHART_PATH }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install "${{ inputs.release_name }}" \
            ${{ env.CHART_PATH }} \
            --namespace "${{ inputs.namespace }}" \
            --values "${{ inputs.values_file }}" \
            --set "image.repository=${{ inputs.image_repository }}" \
            --set-string "image.tag=${{ inputs.image_tag }}" \
            --set "usersSecret.name=${{ env.USERS_SECRET_NAME }}" \
            --wait \
            --timeout 5m \
            --atomic

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/"${{ inputs.release_name }}" -n "${{ inputs.namespace }}" --timeout=5m
          kubectl get deployment "${{ inputs.release_name }}" -n "${{ inputs.namespace }}" -o wide
          kubectl get pods -n "${{ inputs.namespace }}" -l "app.kubernetes.io/name=go-radioproxy"

      - name: Cleanup SSH tunnel
        if: always()
        run: |
          if [[ -n "${{ steps.tunnel.outputs.ssh_pid }}" ]]; then
            kill ${{ steps.tunnel.outputs.ssh_pid }} 2>/dev/null || true
          fi

      - name: Cleanup local secrets
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f ~/.kube/config
